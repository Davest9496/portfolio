<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeeDev| My Portfolio Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Asap+Condensed:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&family=Asap:wght@400;500;600;700&display=swap"

    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/0666a8bc0c.js"
      crossorigin="anonymous"

  <body>
    <section class="mail">
      <div class="mail__me">
        <div class="mail__me--form">
          <h1 class="container__heading u-text-align-start u-margin-bottom">
            <span class="container__heading--1">Contact</span>
            <span class="container__heading--2">me</span>
          </h1>

          <form method="post" action="mailto: evergreendave1@yahoo.com" class="form">
            <div class="form__group">
              <input
                type="text"
                placeholder="Full name"
                name="full-name"
                class="form__input"
                id="name"
                required
              />
              <label for="name" class="form__label">Full name</label>
            </div>

            <div class="form__group">
              <input
                type="email"
                placeholder="Email address"
                name="e-mail"
                class="form__input"
                id="email"
                required
              />
              <label for="email" class="form__label">Email address</label>
            </div>

            <div class="text-area">
              <label for="text-area" class="form__label">Your message</label>

              <textarea
                name="text-area"
                id="text-area"
                cols="30"
                rows="10"
                class="message-box u-margin-bottom"
                required
              >
              </textarea>
            </div>

            <button class="btn-send btn-readme u-margin-bottom" type="submit">
              Send message &rarr;
            </button>
          </form>
        </div>
      </div>
    </section>

   <div class="nav">
